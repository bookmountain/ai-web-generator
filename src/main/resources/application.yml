spring:
  application:
    name: ai-web-generator-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_web_generator
    username: root
    password: root
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.book.aiwebgenerator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: en
