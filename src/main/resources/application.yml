spring:
  application:
    name: ai-web-generator-backend
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_web_generator
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
  profiles:
    active: local
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <YOUR-API-KEY>
      model-name: deepseek-v4-flash
      max-tokens: 8192
      log-requests: true
      log-responses: true
    #      strict-json-schema: true
    #      response-format: json_object
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <YOUR-API-KEY>
      model-name: deepseek-v4-flash
      max-tokens: 8192
      log-requests: true
      log-responses: true

server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.book.aiwebgenerator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: en

# Cloudflare R2 Object Storage Configuration
r2:
  public-base-url: https://pub-eaba1320132c41f6b5648ece0ba035a4.r2.dev
  object-prefix: ai-web-generator
  client:
    endpoint: https://b36c45b484aa3fdd762846963ca257a0.r2.cloudflarestorage.com
    accessKey: your-access-key-id
    secretKey: your-secret-access-key
    bucket: ai-web-generator
