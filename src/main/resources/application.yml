spring:
  application:
    name: ai-web-generator-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_web_generator
    username: root
    password: root
  profiles:
    active: local
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <YOUR-API-KEY>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
      strict-json-schema: true
      response-format: json_object
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your API Key>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.book.aiwebgenerator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: en
